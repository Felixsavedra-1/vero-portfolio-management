<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vero</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #080808;
  --border: #1a1a1a;
  --text:   #b8b8b8;
  --dim:    #686868;
  --cream:  #f2e6cc;
  --tan:    #c8b89a;
  --gold:   #d4956a;
  --orange: #FF8003;
  --neg:    #c86030;
  --font:   'Courier New', Courier, monospace;
}

html, body {
  width: 100%; min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
}

/* ── Neo-grid overlay ───────────────────────────────────────────────────── */
body::before {
  content: ''; position: fixed; inset: 0;
  pointer-events: none; z-index: 1;
  background:
    linear-gradient(rgba(255,200,100,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,200,100,0.012) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ── Scanlines ──────────────────────────────────────────────────────────── */
body::after {
  content: ''; position: fixed; inset: 0;
  pointer-events: none; z-index: 9999;
  background: repeating-linear-gradient(
    0deg, transparent 0, transparent 3px,
    rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
  );
}

/* ── Header ─────────────────────────────────────────────────────────────── */
#header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 20px;
  padding: 13px 28px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 20px rgba(255,128,3,0.06);
  font-size: 14px;
}

@keyframes akira-glitch {
  0%, 88%, 100% { transform: translateX(0); text-shadow: none; clip-path: none; }
  89%  { transform: translateX(-3px);
         clip-path: polygon(0 15%, 100% 15%, 100% 38%, 0 38%);
         text-shadow: 3px 0 var(--gold); }
  90%  { transform: translateX(3px);
         clip-path: polygon(0 55%, 100% 55%, 100% 78%, 0 78%);
         text-shadow: -3px 0 var(--orange); }
  91%  { transform: translateX(0); clip-path: none; text-shadow: none; }
}

#header-title {
  font-size: 16px; font-weight: bold;
  letter-spacing: 0.20em; color: var(--tan);
  pointer-events: none;
  animation: akira-glitch 5s ease-in-out infinite;
}

#header-gain {
  margin-left: auto;
  font-size: 14px; letter-spacing: 0.08em;
  transition: opacity 60ms;
}

#header-status {
  display: flex; align-items: center; gap: 7px;
  font-size: 13px; letter-spacing: 0.12em; color: var(--dim);
}

#status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--dim);
}
#status-dot.live {
  background: var(--tan);
  animation: dot-pulse 2.4s ease-in-out infinite;
}
@keyframes dot-pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.25; }
}

#header-time {
  font-size: 13px; color: var(--dim);
  letter-spacing: 0.06em; margin-left: 14px;
}
#header-brand {
  font-size: 14px; letter-spacing: 0.14em; color: var(--tan);
}
#header-staleness {
  font-size: 13px; letter-spacing: 0.06em;
  transition: color 0.4s;
}
#header-staleness.stale { color: var(--gold); }
#header-staleness.old   { color: var(--orange); }

/* ── Main grid ──────────────────────────────────────────────────────────── */
#main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  min-height: calc(100vh - 50px);
}

/* ── Panel ──────────────────────────────────────────────────────────────── */
.panel {
  background: var(--bg);
  padding: 32px 32px 40px;
  display: flex; flex-direction: column; gap: 28px;
  box-shadow: inset 0 0 28px rgba(255,128,3,0.03);
}
.panel--full { grid-column: 1 / -1; }

.panel-header {
  display: flex; justify-content: flex-start; align-items: baseline; gap: 16px;
}
.panel-label {
  font-size: 12px; letter-spacing: 0.24em;
  color: var(--dim); text-transform: uppercase;
}
.panel-value {
  font-size: 32px; color: var(--tan);
  letter-spacing: 0.04em; font-weight: bold;
}

/* ── 3D chart container ─────────────────────────────────────────────────── */
.chart-container {
  position: relative;
  width: 100%; max-width: 300px;
  min-height: 280px;
  margin: 0 auto;
  aspect-ratio: 1 / 1;
}

/* ── Progress bar ───────────────────────────────────────────────────────── */
.progress-wrap { display: flex; flex-direction: column; gap: 7px; }

.progress-meta {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 13px; letter-spacing: 0.08em;
}
.progress-meta .lbl { color: var(--dim); }
.progress-meta .pct { color: var(--tan); }

.progress-track {
  width: 100%; height: 8px;
  background: var(--border);
  border-radius: 4px; overflow: hidden;
}
.progress-fill {
  height: 100%; width: 0; border-radius: 4px;
  background: linear-gradient(90deg,
    var(--cream)  0%,
    var(--tan)   28%,
    var(--gold)  58%,
    var(--orange) 100%
  );
  box-shadow: 0 0 10px 1px rgba(255, 128, 3, 0.55),
              0 0 4px  1px rgba(255, 200, 100, 0.3);
  position: relative;
  overflow: hidden;
  animation: fill-bar 1.6s 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
.progress-fill::after {
  content: '';
  position: absolute; top: 0; bottom: 0; left: -55%; width: 55%;
  background: linear-gradient(90deg,
    transparent 0%, rgba(255,255,255,0.45) 50%, transparent 100%
  );
  animation: akira-shimmer 2.4s 2.3s ease-in-out infinite;
}
@keyframes fill-bar { to { width: var(--pct, 0%); } }
@keyframes akira-shimmer {
  0%   { left: -55%; opacity: 0.7; }
  60%  { opacity: 1; }
  100% { left: 120%; opacity: 0.7; }
}

.progress-foot {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--dim); letter-spacing: 0.06em;
}

.goal-hint {
  font-size: 12px; color: var(--dim);
  letter-spacing: 0.04em; line-height: 1.6; padding: 2px 0;
}

/* ── Data table ─────────────────────────────────────────────────────────── */
.table-label {
  font-size: 12px; letter-spacing: 0.22em;
  color: var(--dim); text-transform: uppercase; margin-bottom: 12px;
}

.data-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 14px; gap: 8px;
}
.data-row:last-child { border-bottom: none; }

.dr-left  { color: var(--tan); min-width: 72px; letter-spacing: 0.06em; font-size: 14px; }
.dr-mid   { color: var(--dim); flex: 1; font-size: 13px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.dr-right { text-align: right; min-width: 80px; font-size: 14px; color: var(--tan); }
.dr-sub   { display: block; font-size: 12px; color: var(--dim); margin-top: 1px; }
.dr-sub.pos { color: var(--tan); }
.dr-sub.neg { color: var(--neg); }

/* ── Holding metrics bar ────────────────────────────────────────────────── */
.holding-metrics {
  display: flex; gap: 18px; flex-wrap: wrap;
  padding: 2px 0 10px 0; border-bottom: 1px solid var(--border);
  font-size: 12px; letter-spacing: 0.04em;
}
.holding-metrics:last-child { border-bottom: none; }
.hm-seg   { display: flex; align-items: baseline; gap: 5px; }
.hm-label { font-size: 11px; color: var(--dim); letter-spacing: 0.10em; text-transform: uppercase; }
.hm-val   { color: var(--tan); }
.hm-pos   { color: var(--tan); }
.hm-neg   { color: var(--neg); }

/* ── Watchlist ──────────────────────────────────────────────────────────── */
.wl-tf-bar { display: flex; gap: 5px; align-items: center; margin-left: auto; }
.wl-tf {
  background: none; border: 1px solid var(--border); color: var(--dim);
  font-family: var(--font); font-size: 12px; letter-spacing: 0.12em;
  padding: 3px 9px; cursor: pointer; border-radius: 2px;
  transition: color 0.15s, border-color 0.15s;
}
.wl-tf:hover  { color: var(--tan);    border-color: var(--tan); }
.wl-tf.active { color: var(--orange); border-color: var(--orange); }

.wl-row {
  display: grid;
  grid-template-columns: minmax(120px, 1.4fr) 110px 190px 1fr 220px;
  align-items: center; gap: 20px; padding: 13px 0;
  border-bottom: 1px solid var(--border);
}
.wl-row:last-child { border-bottom: none; }

.wl-name  { font-size: 14px; color: var(--tan); letter-spacing: 0.06em; }
.wl-tick  { font-size: 12px; color: var(--dim); letter-spacing: 0.10em; margin-top: 3px; }
.wl-price { font-size: 16px; color: var(--tan); letter-spacing: 0.04em; font-weight: bold; }

.wl-signal         { font-size: 13px; letter-spacing: 0.10em; }
.wl-signal.BULLISH { color: #00d56f; }
.wl-signal.BEARISH { color: #d71200; }
.wl-signal.NEUTRAL { color: var(--orange); }
.wl-reason  { font-size: 12px; color: var(--dim); letter-spacing: 0.06em; margin-top: 3px; }
.wl-sparkline  { display: block; width: 220px; height: 48px; }
.hm-sparkline  { display: block; margin-left: auto; opacity: 0.82; }

#analysis-content img {
  width: 100%; display: block;
  border-radius: 2px; opacity: 0.92;
}
.wl-empty { font-size: 13px; color: var(--dim); letter-spacing: 0.10em; padding: 28px 0; text-align: center; }

/* ── Watchlist tooltip ──────────────────────────────────────────────────── */
#wl-tooltip {
  position: fixed;
  pointer-events: none;
  background: #0d0b09;
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  letter-spacing: 0.04em;
  padding: 10px 14px;
  border-radius: 2px;
  opacity: 0;
  transition: opacity 0.15s;
  box-shadow: 0 0 14px rgba(255,128,3,0.18);
  z-index: 500;
  max-width: 320px;
  line-height: 1.55;
  display: none;
}
#wl-tooltip .tt-sector {
  font-size: 11px;
  letter-spacing: 0.16em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 6px;
}
#wl-tooltip .tt-desc { color: var(--dim); }
.wl-name { cursor: pointer; }
.wl-name.active-analysis { color: var(--orange); }

/* ── Analysis panel content ─────────────────────────────────────────────── */
.an-empty  { font-size: 13px; color: var(--dim); letter-spacing: 0.10em; padding: 28px 0; text-align: center; }
.an-header { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 22px; }
.an-ticker { font-size: 22px; color: var(--tan); letter-spacing: 0.12em; font-weight: bold; }
.an-label  { font-size: 14px; color: var(--text); letter-spacing: 0.06em; }
.an-sector { font-size: 11px; color: var(--gold); letter-spacing: 0.16em; text-transform: uppercase; margin-left: auto; }
.an-tf-bar { display: flex; gap: 5px; }
#an-chart-wrap { position: relative; width: 100%; height: 140px; margin-bottom: 28px; }
#an-chart      { display: block; }
.an-metrics { display: flex; flex-wrap: wrap; border: 1px solid var(--border); margin-bottom: 2px; }
.an-metric  { flex: 1; min-width: 80px; padding: 13px 16px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; }
.an-metric:last-child { border-right: none; }
.an-m-label { font-size: 11px; color: var(--dim); letter-spacing: 0.16em; text-transform: uppercase; }
.an-m-val   { font-size: 15px; letter-spacing: 0.04em; }
.an-m-pos   { color: var(--tan); }
.an-m-neg   { color: var(--neg); }
.an-m-neu   { color: var(--dim); }
.an-desc    { font-size: 13px; color: var(--dim); letter-spacing: 0.04em; line-height: 1.65; border-top: 1px solid var(--border); padding-top: 20px; margin-top: 22px; }

/* ── Scrollbar ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

/* ── Reduced motion ─────────────────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
}
</style>
</head>
<body>
<div id="wl-tooltip"><div class="tt-sector" id="tt-sector"></div><div class="tt-desc" id="tt-desc"></div></div>
<div id="app">

  <header id="header">
    <span id="header-brand">vedra &amp; co</span>
    <span style="color:var(--orange)">|</span>
    <span id="header-title"></span>

    <div id="header-status">
      <span id="status-dot"></span>
      <span id="status-label">OFFLINE</span>
    </div>
    <span id="header-staleness"></span>

  <main id="main">

    <!-- Savings panel (LEFT) -->

      <div class="chart-container" id="chart-savings"

        <div class="table-label">ACCOUNTS</div>

    <section class="panel">
      <div class="panel-header">

          <button class="wl-tf" data-tf="YTD">YTD</button>
        </div>
      </div>
      <div id="watchlist-rows"></div>
    </section>

  </main>
</div>

<!-- three@0.150.0 — last npm release with the UMD build included -->
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"
        crossorigin="anonymous"></script>

<script>
// __DASH_DATA_PLACEHOLDER__
</script>

<script>
'use strict';

const D       = window.__DASH__ || { savings: [], holdings: [], watchlist: [], totals: {} };
const T       = D.totals || {};
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const SLICE_COLORS = [
  '#c8b89a', '#d4956a', '#FF8003', '#a07848',
  '#6b4c2a', '#e8c870', '#8B6914',
];

function fmt$(v) {
  return '$' + (+v || 0).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtPct(v) {
  return (v >= 0 ? '+' : '') + (+v || 0).toFixed(2) + '%';
}
function fmtPrice(v) {
  return '$' + (+v || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtSigned$(v) {
  const n = +v || 0;
  return (n >= 0 ? '+$' : '-$') + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function escapeHTML(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function typeWriter(el, text, msPer, cb) {
  if (REDUCED) { el.textContent = text; cb && cb(); return; }
  let i = 0;
  const id = setInterval(() => {
    el.textContent += text[i++];
    if (i >= text.length) { clearInterval(id); cb && cb(); }
  }, msPer);
}

// ── Three.js 3D ring chart ──────────────────────────────────────────────────
function build3DRing(containerId, labels, values) {
  const container = document.getElementById(containerId);
  if (!container) return;

  if (!window.THREE) {
    container.innerHTML = '<p style="color:var(--dim);font-size:13px;text-align:center;padding-top:40%">3D unavailable</p>';
    return;
  }

  container.innerHTML = '';

  const W = container.clientWidth  || 280;
  const H = container.clientHeight || W;

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 100);
  camera.position.set(0, 2.2, 5);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  const OUTER_R = 1.4, INNER_R = 0.72, DEPTH = 0.28;
  const MID_R   = (OUTER_R + INNER_R) / 2;
  const total   = values.reduce((a, b) => a + b, 0) || 1;
  const group   = new THREE.Group();
  const meshes  = [];
  let   ang0    = 0;

  values.forEach((val, i) => {
    if (val <= 0) return;
    const sliceAng = Math.min((val / total) * Math.PI * 2, Math.PI * 2 - 0.001);
    const hexColor = SLICE_COLORS[i % SLICE_COLORS.length];
    const color    = new THREE.Color(hexColor);

    const shape = new THREE.Shape();
    shape.absarc(0, 0, OUTER_R, ang0, ang0 + sliceAng, false);
    shape.absarc(0, 0, INNER_R, ang0 + sliceAng, ang0, true);
    shape.closePath();

    const geo = new THREE.ExtrudeGeometry(shape, { depth: DEPTH, bevelEnabled: false });
    const mat = new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: 0.3,
      metalness: 0.7, roughness: 0.4,
    });

    const mesh    = new THREE.Mesh(geo, mat);
    mesh.userData = { label: labels[i] || '—', value: val, midAngle: ang0 + sliceAng / 2, hexColor };
    group.add(mesh);
    meshes.push(mesh);
    ang0 += sliceAng;
  });

  group.position.z = -DEPTH / 2;
  scene.add(group);

  // Static ambient lighting
  scene.add(new THREE.AmbientLight(0x0d0a06, 3));
  const wL = new THREE.PointLight(0xFF8003, 2.5, 20);
  wL.position.set(3, 4, 4);
  scene.add(wL);
  const gL = new THREE.PointLight(0xd4956a, 1.0, 20);
  gL.position.set(-2, -2, 3);
  scene.add(gL);
  const fL = new THREE.DirectionalLight(0xffeedd, 0.35);
  fL.position.set(0, 5, 5);
  scene.add(fL);

  // Dynamic hover light — follows the hovered slice as the ring rotates
  const hoverLight = new THREE.PointLight(0xFF8003, 0, 8);
  scene.add(hoverLight);

  // ── Particle system ───────────────────────────────────────────────────────
  const PCOUNT = 55;
  const pPos   = new Float32Array(PCOUNT * 3);
  const pVel   = Array.from({ length: PCOUNT }, () => new THREE.Vector3());
  const pLife  = new Float32Array(PCOUNT); // remaining life in seconds

  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));

  const pMat = new THREE.PointsMaterial({
    color: 0xFF8003, size: 0.06,
    transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
  });
  const ps = new THREE.Points(pGeo, pMat);
  scene.add(ps);

  // Park all particles off-screen until first spawn
  for (let i = 0; i < PCOUNT; i++) { pPos[i*3] = pPos[i*3+1] = pPos[i*3+2] = 999; }

  // World-space center of a slice, updated each frame as the ring rotates
  function sliceWorldPos(mesh) {
    const v = new THREE.Vector3(
      Math.cos(mesh.userData.midAngle) * MID_R,
      Math.sin(mesh.userData.midAngle) * MID_R,
      DEPTH / 2,
    );
    group.localToWorld(v);
    return v;
  }

  function spawnParticle(i, origin) {
    pPos[i*3]   = origin.x + (Math.random() - 0.5) * 0.28;
    pPos[i*3+1] = origin.y + (Math.random() - 0.5) * 0.28;
    pPos[i*3+2] = origin.z + (Math.random() - 0.5) * 0.12;
    const spd = 0.009 + Math.random() * 0.013;
    const a   = Math.random() * Math.PI * 2;
    pVel[i].set(
      Math.cos(a) * spd * 0.7,
      Math.sin(a) * spd * 0.5 + 0.005,   // slight upward drift
      (Math.random() - 0.5) * spd * 0.4,
    );
    pLife[i] = 0.5 + Math.random() * 0.5;
  }

  // ── Hover state ───────────────────────────────────────────────────────────
  let hoverTarget   = null;
  let particleAlpha = 0;

  // ── Tooltip ───────────────────────────────────────────────────────────────
  const tip = document.createElement('div');
  tip.style.cssText = "position:absolute;pointer-events:none;background:#0d0b09;" +
    "border:1px solid #1a1a1a;color:#b8b8b8;font-family:'Courier New',monospace;" +
    "font-size:12px;letter-spacing:0.08em;padding:7px 12px;border-radius:2px;" +
    "opacity:0;transition:opacity 0.15s;box-shadow:0 0 10px rgba(255,128,3,0.25);" +
    "z-index:10;white-space:nowrap;";
  container.appendChild(tip);

  const ray   = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  renderer.domElement.addEventListener('mousemove', e => {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
    mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
    ray.setFromCamera(mouse, camera);
    const hits = ray.intersectObjects(meshes);
    if (hits.length) {
      const ud  = hits[0].object.userData;
      const pct = (ud.value / total * 100).toFixed(1);
      tip.innerHTML     = `${escapeHTML(ud.label)}<br>${fmt$(ud.value)}&nbsp;(${pct}%)`;
      tip.style.opacity = '1';
      tip.style.left    = (e.clientX - rect.left + 14) + 'px';
      tip.style.top     = (e.clientY - rect.top  +  8) + 'px';
      hoverTarget = hits[0].object;
    } else {
      tip.style.opacity = '0';
      hoverTarget = null;
    }
  });
  renderer.domElement.addEventListener('mouseleave', () => {
    tip.style.opacity = '0';
    hoverTarget = null;
  });

  // ── Animation loop ────────────────────────────────────────────────────────
  (function loop() {
    requestAnimationFrame(loop);
    if (!REDUCED) group.rotation.y += 0.004;

    // Animate per-slice emissive glow + radial pop
    meshes.forEach(m => {
      const on  = m === hoverTarget;
      m.material.emissiveIntensity += ((on ? 0.75 : 0.3)  - m.material.emissiveIntensity) * 0.12;
      m.position.x += ((on ? Math.cos(m.userData.midAngle) * 0.1 : 0) - m.position.x) * 0.12;
      m.position.y += ((on ? Math.sin(m.userData.midAngle) * 0.1 : 0) - m.position.y) * 0.12;
    });

    // Hover light tracks the rotating slice in world space
    if (hoverTarget) {
      const lv = sliceWorldPos(hoverTarget);
      lv.z += 0.5;
      hoverLight.position.lerp(lv, 0.15);
      hoverLight.color.set(hoverTarget.userData.hexColor);
      hoverLight.intensity += (3.0 - hoverLight.intensity) * 0.12;
    } else {
      hoverLight.intensity += (0 - hoverLight.intensity) * 0.12;
    }

    // Particle fade-in/out + continuous spawn + drift
    particleAlpha    += ((hoverTarget ? 1 : 0) - particleAlpha) * 0.1;
    pMat.opacity      = particleAlpha * 0.88;
    const origin      = hoverTarget ? sliceWorldPos(hoverTarget) : null;
    for (let i = 0; i < PCOUNT; i++) {
      pLife[i] -= 0.016;
      if (pLife[i] <= 0) {
        if (origin) spawnParticle(i, origin);
        else { pPos[i*3] = pPos[i*3+1] = pPos[i*3+2] = 999; }
      } else {
        pPos[i*3]   += pVel[i].x;
        pPos[i*3+1] += pVel[i].y;
        pPos[i*3+2] += pVel[i].z;
        pVel[i].multiplyScalar(0.97); // drag
      }
    }
    pGeo.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
  })();
}

// ── Progress bar ────────────────────────────────────────────────────────────
function renderProgressBar(containerId, current, goal, type) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!goal) {
    el.innerHTML = `<p class="goal-hint">No goal set &mdash; run:&nbsp;<span style="color:var(--text)">portfolio goal set ${type} AMOUNT</span></p>`;
    return;
  }
  const pct    = Math.min(current / goal * 100, 100);
  const pctStr = pct.toFixed(1) + '%';
  el.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="lbl">GOAL PROGRESS</span>
        <span class="pct">${pctStr}</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="--pct:${pctStr}"></div>
      </div>
      <div class="progress-foot">
        <span>${fmt$(current)}</span>
        <span>Goal&nbsp;${fmt$(goal)}</span>
      </div>
    </div>`;
}

// ── Digit flicker ────────────────────────────────────────────────────────────
function scheduleFlicker(el) {
  if (REDUCED) return;
  const delay = 4000 + Math.random() * 5000;
  setTimeout(() => {
    el.style.opacity = '0.3';
    setTimeout(() => { el.style.opacity = ''; scheduleFlicker(el); }, 55);
  }, delay);
}

// ── Header ───────────────────────────────────────────────────────────────────
function renderHeader() {
  typeWriter(document.getElementById('header-title'), 'VERO', 14);

  const gainEl = document.getElementById('header-gain');
  const pct    = T.total_gain_pct || 0;
  gainEl.textContent = fmtPct(pct);
  gainEl.style.color = pct >= 0 ? 'var(--tan)' : 'var(--neg)';
  scheduleFlicker(gainEl);

  if (D.generated) {
    document.getElementById('status-dot').classList.add('live');
    document.getElementById('status-label').textContent = 'LIVE';
  }

  const generatedMs = D.generated ? new Date(D.generated).getTime() : null;
  const stalenessEl = document.getElementById('header-staleness');
  const updateStaleness = () => {
    if (!generatedMs) { stalenessEl.textContent = ''; return; }
    const mins  = Math.floor((Date.now() - generatedMs) / 60000);
    const label = mins < 1  ? 'data: just now'
                : mins < 60 ? `data: ${mins}m ago`
                : `data: ${Math.floor(mins / 60)}h ${mins % 60}m ago`;
    stalenessEl.textContent = label;
    stalenessEl.className   = mins >= 60 ? 'old' : mins >= 15 ? 'stale' : '';
  };
  updateStaleness();
  setInterval(updateStaleness, 60000);

  const tickTime = () => {
    document.getElementById('header-time').textContent =
      new Date().toLocaleTimeString('en-US', { hour12: false });
  };
  tickTime();
  setInterval(tickTime, 60000);
}

// ── Sparklines ───────────────────────────────────────────────────────────────
const WL_W = 220, WL_H = 48;

function drawSparkline(canvas, prices, w, h) {
  const W   = w || WL_W, H = h || WL_H;
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  if (!prices || prices.length < 2) {
    ctx.strokeStyle = 'rgba(104,104,104,0.25)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2); ctx.stroke();
    return;
  }

  const n = prices.length, PAD = 5;
  const min = Math.min(...prices), max = Math.max(...prices), rng = max - min || 1;
  const xp  = i => (i / (n - 1)) * W;
  const yp  = v => H - PAD - ((v - min) / rng) * (H - PAD * 2);

  function makeGrads() {
    const lg = ctx.createLinearGradient(0, 0, W, 0);
    lg.addColorStop(0,    '#f2e6cc');
    lg.addColorStop(0.28, '#c8b89a');
    lg.addColorStop(0.58, '#d4956a');
    lg.addColorStop(1,    '#FF8003');
    const fg = ctx.createLinearGradient(0, 0, 0, H);
    fg.addColorStop(0, 'rgba(255,128,3,0.18)');
    fg.addColorStop(1, 'rgba(255,128,3,0)');
    return { lg, fg };
  }

  function drawStatic(count) {
    const { lg, fg } = makeGrads();
    const c = Math.max(2, count || n);
    ctx.clearRect(0, 0, W, H);
    ctx.beginPath();
    ctx.moveTo(xp(0), yp(prices[0]));
    for (let i = 1; i < c; i++) ctx.lineTo(xp(i), yp(prices[i]));
    ctx.lineTo(xp(c - 1), H); ctx.lineTo(xp(0), H); ctx.closePath();
    ctx.fillStyle = fg; ctx.fill();
    ctx.save();
    ctx.shadowBlur = 7; ctx.shadowColor = 'rgba(255,128,3,0.75)';
    ctx.beginPath();
    ctx.moveTo(xp(0), yp(prices[0]));
    for (let i = 1; i < c; i++) ctx.lineTo(xp(i), yp(prices[i]));
    ctx.strokeStyle = lg; ctx.lineWidth = 1.8;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.stroke(); ctx.restore();
  }

  if (REDUCED) { drawStatic(n); return; }

  const t0 = performance.now(), dur = 800;
  function drawFrame(now) {
    const t = Math.min((now - t0) / dur, 1);
    drawStatic(Math.max(2, Math.round((1 - Math.pow(1 - t, 3)) * n)));
    if (t < 1) { requestAnimationFrame(drawFrame); return; }
    drawStatic(n);
    const s0 = performance.now(), sd = 650;
    function shimmer(ts) {
      const st = Math.min((ts - s0) / sd, 1);
      drawStatic(n);
      const sx = (st * 1.6 - 0.3) * W;
      const sg = ctx.createLinearGradient(sx - W * 0.18, 0, sx + W * 0.18, 0);
      sg.addColorStop(0, 'rgba(255,255,255,0)');
      sg.addColorStop(0.5, 'rgba(255,255,255,0.22)');
      sg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);
      if (st < 1) requestAnimationFrame(shimmer);
    }
    requestAnimationFrame(shimmer);
  }
  requestAnimationFrame(drawFrame);
}

let activeTF = '1W';

// ── Analysis panel ──────────────────────────────────────────────────────────
let activeAnalysisTicker = null;
let activeAnalysisTF     = 'YTD';

function _pctRet(prices) {
  if (!prices || prices.length < 2 || prices[0] === 0) return null;
  return (prices[prices.length - 1] - prices[0]) / prices[0] * 100;
}
function _annualVol(prices) {
  if (!prices || prices.length < 3) return null;
  const rets = [];
  for (let i = 1; i < prices.length; i++) {
    if (prices[i - 1] > 0) rets.push((prices[i] - prices[i - 1]) / prices[i - 1]);
  }
  if (rets.length < 2) return null;
  const mu = rets.reduce((a, b) => a + b, 0) / rets.length;
  const v  = rets.reduce((a, r) => a + (r - mu) ** 2, 0) / (rets.length - 1);
  return Math.sqrt(v * 252) * 100;
}
function _maxDD(prices) {
  if (!prices || prices.length < 2) return null;
  let peak = prices[0], mdd = 0;
  for (const p of prices) {
    if (p > peak) peak = p;
    const dd = (p - peak) / peak * 100;
    if (dd < mdd) mdd = dd;
  }
  return mdd;
}

function _drawAnalysisChart(prices) {
  requestAnimationFrame(() => {
    const wrap = document.getElementById('an-chart-wrap');
    const c    = document.getElementById('an-chart');
    if (!wrap || !c) return;
    drawSparkline(c, prices, wrap.clientWidth || 800, wrap.clientHeight || 140);
  });
}

function renderAnalysisPanel(w) {
  const h        = w.history || {};
  const TFS      = ['1W', '1M', '3M', '6M', 'YTD'];
  const longHist = (h.YTD && h.YTD.length > 5) ? h.YTD : ((h['6M'] && h['6M'].length > 5) ? h['6M'] : []);

  const METRICS = [
    { label: '1W',  val: _pctRet(h['1W']  || []) },
    { label: '1M',  val: _pctRet(h['1M']  || []) },
    { label: '3M',  val: _pctRet(h['3M']  || []) },
    { label: '6M',  val: _pctRet(h['6M']  || []) },
    { label: 'YTD', val: _pctRet(h.YTD    || []) },
    { label: 'VOL', val: _annualVol(longHist), isVol: true },
    { label: 'MDD', val: _maxDD(longHist),     isMdd: true },
  ];

  function metricHTML(m) {
    let text, cls;
    if (m.val === null || m.val === undefined || isNaN(m.val)) {
      text = '—'; cls = 'an-m-neu';
    } else if (m.isVol) {
      text = m.val.toFixed(1) + '%'; cls = 'an-m-neu';
    } else if (m.isMdd) {
      text = m.val.toFixed(1) + '%'; cls = m.val < -5 ? 'an-m-neg' : 'an-m-neu';
    } else {
      text = (m.val >= 0 ? '+' : '') + m.val.toFixed(2) + '%';
      cls  = m.val > 0.001 ? 'an-m-pos' : m.val < -0.001 ? 'an-m-neg' : 'an-m-neu';
    }
    return `<div class="an-metric"><span class="an-m-label">${m.label}</span><span class="an-m-val ${cls}">${text}</span></div>`;
  }

  document.getElementById('analysis-hint').textContent = '';
  document.getElementById('analysis-content').innerHTML = `
    <div class="an-header">
      <span class="an-ticker">${escapeHTML(w.ticker)}</span>
      <span class="an-label">${escapeHTML(w.label)}</span>
      ${w.sector ? `<span class="an-sector">${escapeHTML(w.sector)}</span>` : ''}
      <div class="an-tf-bar">${TFS.map(t => `<button class="wl-tf${t === activeAnalysisTF ? ' active' : ''}" data-an-tf="${t}">${t}</button>`).join('')}</div>
    </div>
    <div id="an-chart-wrap"><canvas id="an-chart"></canvas></div>
    <div class="an-metrics">${METRICS.map(metricHTML).join('')}</div>
    ${w.description ? `<p class="an-desc">${escapeHTML(w.description)}</p>` : ''}
  `;
  _drawAnalysisChart((h[activeAnalysisTF] || h.YTD || h['6M'] || []));
}

function clearAnalysisPanel() {
  activeAnalysisTicker = null;
  document.getElementById('analysis-hint').textContent = '';
  document.getElementById('analysis-content').innerHTML =
    '<div class="an-empty">Click a company in the watchlist to view analysis.</div>';
}

// ── Boot ─────────────────────────────────────────────────────────────────────
(function init() {
  renderHeader();

  document.getElementById('val-portfolio').textContent = fmt$(T.portfolio_value || 0);
  document.getElementById('val-savings').textContent   = fmt$(T.savings_total   || 0);

  // Defer 3D init by one frame so layout dimensions are committed
  requestAnimationFrame(() => {
    const holdings = D.holdings || [];
    build3DRing(
      'chart-portfolio',
      holdings.length ? holdings.map(h => h.ticker) : ['—'],
      holdings.length ? holdings.map(h => h.value)  : [1],
    );

    const savings = D.savings || [];
    build3DRing(
      'chart-savings',
      savings.length ? savings.map(s => s.name)    : ['—'],
      savings.length ? savings.map(s => s.balance) : [1],
    );
  });

  renderProgressBar('prog-portfolio', T.portfolio_value || 0, T.portfolio_goal || null, 'portfolio');
  renderProgressBar('prog-savings',   T.savings_total   || 0, T.savings_goal   || null, 'savings');

  document.querySelector('.wl-tf-bar')?.addEventListener('click', e => {
    const btn = e.target.closest('.wl-tf');
    if (!btn) return;
    document.querySelectorAll('.wl-tf').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTF = btn.dataset.tf;
    drawAllSparklines();
  });

  renderHoldings();
  renderSavings();
  renderWatchlist();
  clearAnalysisPanel();

  // ── Watchlist company click → analysis ──────────────────────────────────
  document.getElementById('watchlist-rows').addEventListener('click', e => {
    const nameEl = e.target.closest('.wl-name');
    if (!nameEl) return;
    const ticker = nameEl.closest('.wl-row')?.dataset.ticker;
    const w      = ticker && (D.watchlist || []).find(x => x.ticker === ticker);
    if (!w) return;
    document.querySelectorAll('.wl-name').forEach(n => n.classList.remove('active-analysis'));
    if (activeAnalysisTicker === ticker) { clearAnalysisPanel(); return; }
    nameEl.classList.add('active-analysis');
    activeAnalysisTicker = ticker;
    renderAnalysisPanel(w);
    document.getElementById('analysis-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  // ── Analysis TF buttons ──────────────────────────────────────────────────
  document.getElementById('analysis-panel').addEventListener('click', e => {
    const btn = e.target.closest('[data-an-tf]');
    if (!btn) return;
    const w = (D.watchlist || []).find(x => x.ticker === activeAnalysisTicker);
    if (!w) return;
    activeAnalysisTF = btn.dataset.anTf;
    document.querySelectorAll('[data-an-tf]').forEach(b =>
      b.classList.toggle('active', b.dataset.anTf === activeAnalysisTF)
    );
    _drawAnalysisChart((w.history || {})[activeAnalysisTF] || []);
  });

  // ── Watchlist company tooltip ───────────────────────────────────────────
  const wlTip     = document.getElementById('wl-tooltip');
  const ttSector  = document.getElementById('tt-sector');
  const ttDesc    = document.getElementById('tt-desc');
  let   wlTipTimer = null;

  document.getElementById('watchlist-rows').addEventListener('mouseover', e => {
    const nameEl = e.target.closest('.wl-name');
    if (!nameEl) return;
    const desc   = nameEl.dataset.description || '';
    const sector = nameEl.dataset.sector      || '';
    if (!desc && !sector) return;
    ttSector.textContent = sector;
    ttSector.style.display = sector ? 'block' : 'none';
    ttDesc.textContent   = desc;
    clearTimeout(wlTipTimer);
    wlTip.style.display  = 'block';
    wlTip.style.opacity  = '1';
  });

  document.getElementById('watchlist-rows').addEventListener('mousemove', e => {
    if (!e.target.closest('.wl-name')) return;
    const x = e.clientX + 16;
    const y = e.clientY + 10;
    wlTip.style.left = (x + wlTip.offsetWidth > window.innerWidth ? e.clientX - wlTip.offsetWidth - 8 : x) + 'px';
    wlTip.style.top  = (y + wlTip.offsetHeight > window.innerHeight ? e.clientY - wlTip.offsetHeight - 8 : y) + 'px';
  });

  document.getElementById('watchlist-rows').addEventListener('mouseout', e => {
    if (!e.target.closest('.wl-name')) return;
    wlTip.style.opacity = '0';
    wlTipTimer = setTimeout(() => { wlTip.style.display = 'none'; }, 150);
  });
})();
</script>
